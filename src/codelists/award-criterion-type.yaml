quality-nor-env-criteria:
  name: >-
    Quality – climate- and environmental considerations as award criterion
  nob: 'Kvalitet – klima- og miljøhensyn som tildelingskriterium'
  history:
  - name: 'Kvalitet – klima- og miljøkriterium'
    nob: 'Kvalitet – klima- og miljøkriterium'
  nob_verify: false
  source: 'nor'
  status: 'active'
  note: >-
    Indicates the weighting of award criteria related to climate- and
    envinronmental considerations, alternatively ranking such criteria
    among the top 3 highest priorities in the case of ranking
    award criteria in order of priority. See Section 5b (2) of
    the Norwegian Law on Public Procurements (July 1st 2026 revision).
  valid_from_date: '2024-01-01'
  valid_from_sdk: '1.7'
  valid_to_date: ~
  valid_to_sdk: ~
quality-nor-env-exempt-critical-interest:
  name: >-
    Quality – exemption from climate and environmental requirements under
    Norwegian procurement regulations: essential interests of health, safety
    or emergency preparedness (justification required)
  nob: >-
    Kvalitet – unntak fra klima- og miljøkrav i norsk anskaffelsesregelverk:
    Vesentlige interesser innen helse, sikkerhet eller beredskap (skal
    begrunnes)
  history: []
  nob_verify: false
  source: 'nor'
  status: 'provisional'
  note: >-
    Indicates that climate- and environmental concerns must be set aside of
    a public procurement, as these would harm critical interests related to
    health, safety or emergency preparedness. See Section 5b (3) of the
    Norwegian Law on Public Procurements (July 1st 2026 revision).
  valid_from_date: '2026-07-01'
  valid_from_sdk: '1.13'
  valid_to_date: ~
  valid_to_sdk: ~
quality-nor-env-exempt-national-minimum:
  name: >-
    Quality – exemption from climate and environmental requirements under
    Norwegian procurement regulations: mandatory standardised minimum
    requirements for climate footprint or environmental impact (justification
    required)
  nob: >-
    Kvalitet – unntak fra klima- og miljøkrav i norsk anskaffelsesregelverk:
    Lovpålagte standardiserte minimumskrav til klimaavtrykk eller
    miljøbelastning (skal begrunnes)
  history: []
  nob_verify: false
  source: 'nor'
  status: 'provisional'
  note: >-
    Indicates that the contracting authority is mandated by law to enforce
    standardized minimum requirements for climate or environmental impact.
    See Section 5c of the Norwegian Law on Public Procurements (July 1st
    2026 revision).
  valid_from_date: '2026-07-01'
  valid_from_sdk: '1.13'
  valid_to_date: ~
  valid_to_sdk: ~
quality-nor-env-exempt-insignificant:
  name: >-
    Quality – exemption from climate and environmental requirements under
    Norwegian procurement regulations: negligible climate footprint and
    environmental impact (justification required)
  nob: >-
    Kvalitet – unntak fra klima- og miljøkrav i norsk anskaffelsesregelverk:
    Anskaffelsen har uvesentlig klimaavtrykk og miljøbelastning (skal begrunnes)
  history: []
  nob_verify: false
  source: 'nor'
  status: 'provisional'
  note: >-
    Indicates that the climate- and environmental impacts of
    the procured works, goods or services are negligible, invoking the
    exemption clause in the Norwegian Public Procurement Regulations.
    See Section 5b (3) of the Norwegian Law on Public Procurements 
    (July 1st 2026 revision). 
    Note that this code is an extension and further granularity of
    the exemption clauses present in earlier iterations of the
    Norwegian Public Procurement Regulations.
  valid_from_date: '2026-07-01'
  valid_from_sdk: '1.13'
  replaces: 
    - 'code|name|award-criterion-type.quality-nor-env-none'
  valid_to_date: ~
  valid_to_sdk: ~
quality-nor-env-none:
  name: >-
    Kvalitet – uvesentlig klimaavtrykk og miljøbelastning (begrunnes under)
  nob: >-
    Kvalitet – uvesentlig klimaavtrykk og miljøbelastning (begrunnes under)
  history:
  nob_verify: false
  source: 'nor'
  status: 'deprecated'
  note: >-
    Indicates that the climate- and environmental impacts of
    the procured works, goods or services are negligible, invoking the
    exemption clause in the Norwegian Public Procurement Regulations.
    This is congruent to Section 5b (3) of the Norwegian Law on
    Public Procurements (July 1st 2026 revision). Note that this
    code value originally corresponded to Section 7-9 (5) of the
    Norwegian Public Procurement Regulations, retired on July 1st 2026.
    In the July 1st 2026 regulatory revisions, the exemption clauses
    were extended and granulated further, necessitating the retirement
    of this code value.
  valid_from_date: '2024-01-01'
  valid_from_sdk: '1.7'
  valid_to_date: ~
  valid_to_sdk: ~
  replaced_by: 'quality-nor-env-exempt-insignificant'
quality-nor-env-spec:
  name: >-
    Quality – climate- and environmental requirements form part of the
    specifications
  nob: >-
    Kvalitet – klima- og miljøkrav inngår som del av kravspesifikasjonen
  history:
  - name: >-
      Kvalitet – klima- og miljøkrav i kravspesifikasjonen (begrunnes under)
    nob: >-
      Kvalitet – klima- og miljøkrav i kravspesifikasjonen (begrunnes under)
  nob_verify: false
  source: 'nor'
  status: 'active'
  note: >-
    Indicates that climate- and environmental considerations form
    part of the specifications. See Section 5b (2) of the Norwegian
    Law on Public Procurements (July 1st 2026 revision).
  valid_from_date: '2024-01-01'
  valid_from_sdk: '1.7'
  valid_to_date: ~
  valid_to_sdk: ~
