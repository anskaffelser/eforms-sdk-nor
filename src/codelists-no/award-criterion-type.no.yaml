      ontologi.
    nob_verify: false
    nno: >-
      Denne fila skildrer norske utvidingar av EU-kodeverket for type
      tildelingskriterium, og korleis dei kobles til verdiar gyldige i TEDs
      ontologi.
    nno_verify: false
    eng: >-
      This file describes Norwegian extensions of the EU codelist for award
      criterion types, and how they are mapped to valid values from the TED
      ontology.
    eng_verify: false

export_policies:
  national_platform:
    description:
      nob: >-
        På Doffin, Norges nasjonale plattform for offentlige innkjøp,
        brukes kodene i denne fila som de er. Det vil si at `code`-verdien
        brukes direkte i dataflyten.
      nob_verify: false
      nno: >-
        På Doffin, Noregs nasjonale plattform for offentlege innkjøp, blir
        kodane i denne fila brukt slik dei er. Det vil seie at
        `code`-verdien blir nytta direkte i dataflyten.
      nno_verify: false
      eng: >-
        On Doffin, Norway's national platform for public procurement, the
        codes in this file are used as is. That means, the `code` values are
        used directly in the flow of information.
      eng_verify: false

  ted:
    description:
      nob: >-
        Når DFØ, Norges eSender, oversender kunngjøringer til TED,
        brukes aldri norske utvidelseskoder direkte. I stedet kobler DFØ
        disse alltid til kodeverdien `ted_mapping.code`.
      nob_verify: false
      nno: >-
        Når DFØ, Noregs eSender, sender kunngjeringer over til TED,
        blir aldri norske utvidingskoder brukt direkte. I staden kobler
        DFØ desse alltid til kodeverdien `ted_mapping.code`.
      nno_verify: false
      eng: >-
        When DFØ, Norway's national eSender, submits notices to TED,
        the Norwegian extension codes are never used directly. DFØ
        ensures that these are mapped to the code value
        `ted_mapping.code`.
      eng_verify: false

codes:
  - code: "quality-nor-env-criteria"
    domain: "norwegian-national-extension"
    parent_eu_code: "quality"
    
    ted_mapping:
      mode: "map-to-parent"
      code: "quality"
      note: 
        nob: >-
          Ved innsending til TED kobler DFØ denne verdien til `quality`, 
          jf. `export_policies.ted`.
        nob_verify: false
        nno: >-
          Ved innsending til TED kobler DFØ denne verdien med `quality`,
          jf. `export_policies.ted`.
        nno_verify: false
        eng: >-
          If a notice is submitted to TED, DFØ replaces this value with
          `quality`, in accordance with `export_policies.ted`.
        eng_verify: false
          
    label: 
      nob: "Kvalitet – klima- og miljøkriterium"
      nob_verify: false
      nno: "Kvalitet – klima- og miljøkriterium"
      nno_verify: false
      eng: "Quality – climate- and environmental criteria"
      eng_verify: false
      
    description:
      nob: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Brukes for å indikere vekting av klima- og miljøhensyn, iht. 
        Anskaffelsesforskriftens § 7-9 (2)–(3). 
      nob_verify: false
      nno: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Blir brukt for å indikera vekting av klima- og miljøomsyn, i 
        samsvar med Anskaffelsesforskriftens § 7-9 (2)–(3). 
      nno_verify: false
      eng: >-
        Norwegian extension of the award criterion type `quality`.
        Utilized to indicate weighting of climate- and environmental 
        considerations, in accordance with Section 7-9 (2)-(3) of the
        Norwegian Procurement Regulations.
      eng_verify: false
        
    sdk_value: "QUALITY_NOR_ENV_CRITERIA"

  - code: "quality-nor-env-spec"
    domain: "norwegian-national-extension"
    parent_eu_code: "quality"
    
    ted_mapping:
      mode: "map-to-parent"
      code: "quality"
      note: 
        nob: >-
          Ved innsending til TED kobler DFØ denne verdien til `quality`, 
          jf. `export_policies.ted`.
        nob_verify: false
        nno: >-
          Ved innsending til TED kobler DFØ denne verdien med `quality`,
          jf. `export_policies.ted`.
        nno_verify: false
        eng: >-
          If a notice is submitted to TED, DFØ replaces this value with
          `quality`, in accordance with `export_policies.ted`.
        eng_verify: false
          
    label: 
      nob: >-
        Kvalitet – klima- og miljøkrav i kravspesifikasjonen (begrunnes under)
      nob_verify: false
      nno: >-
        Kvalitet – klima- og miljøkrav i kravspesifikasjonen (blir grunngitt 
        under)
      nno_verify: false
      eng: >-
        Quality – climate- and environmental requirements in the specifications
        (justified below)
      eng_verify: false

    description:
      nob: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Brukes for å indikere at klima- og miljøhensyn i 
        tildelingskriteriene er erstattet med klima- og miljøkrav i 
        kravspesifikasjonen, iht. Anskaffelsesforskriftens § 7-9 (4).
      nob_verify: false
      nno: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Blir brukt for å indikera at klima- og miljøomsyn i 
        tildelingskriteria er erstatta med klima- og miljøkrav i 
        kravspesifikasjonen, i samsvar med Anskaffelsesforskriftens § 7-9 
        (4). 
      nno_verify: false
      eng: >-
        Norwegian extension of the award criterion type `quality`.
        Utilized to indicate that climate and environmental considerations 
        in the award criteria have been replaced with climate and 
        environmental criteria in the requirement specification, in 
        accordance with Section 7-9 (4) of the Norwegian Procurement
        Regulations.
      eng_verify: false

    sdk_value: "QUALITY_NOR_ENV_SPEC"
    
  - code: "quality-nor-env-none"
    domain: "norwegian-national-extension"
    parent_eu_code: "quality"
    
    ted_mapping:
      mode: "map-to-parent"
      code: "quality"
      note: 
        nob: >-
          Ved innsending til TED kobler DFØ denne verdien til `quality`, 
          jf. `export_policies.ted`.
        nob_verify: false
        nno: >-
          Ved innsending til TED kobler DFØ denne verdien med `quality`,
          jf. `export_policies.ted`.
        nno_verify: false
        eng: >-
          If a notice is submitted to TED, DFØ replaces this value with
          `quality`, in accordance with `export_policies.ted`.
        eng_verify: false
          
    label: 
      nob: >-
        Kvalitet – uvesentlig klimaavtrykk og miljøbelastning (begrunnes under)
      nob_verify: false
      nno: >-
        Kvalitet – uvesentleg klimaavtrykk og miljøbelastning (blir grunngitt
        under)
      nno_verify: false
      eng: >-
        Quality – negligible climate footprint and environmental impact 
        (justified below)
      eng_verify: false

    description:
      nob: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Brukes for å indikere at anskaffelsen av sin art har et uvesentlig
        klimaavtrykk og en uvesentlig miljøbelastning, og dermed 
        faller under unntaksbestemmelsen i Anskaffelsesforskriftens § 7-9 (5).
      nob_verify: false
      nno: >-
        Norsk spesifikk underkategori av tildelingskriterium type kvalitet.
        Blir brukt for å indikera at anskaffinga av arten sin har eit 
        uvesentleg klimaavtrykk og ei uvesentleg miljøbelastning, 
        og dermed fell under unntaksregelen i Anskaffelsesforskriftens
        § 7-9 (5).
      nno_verify: false
      eng: >-
        Norwegian extension of the award criterion type `quality`.
        Utilized to indicate that the procurement of its nature has 
        an insignificant climate footprint and an insignificant 
        environmental impact, and thus falls under the exception 
        provision in Section 7-9 (5) of the Norwegian Procurement
        Regulations.
      eng_verify: false

    sdk_value: "QUALITY_NOR_ENV_NONE"
