export_policies:
  national_platform:
    description:
      eng: >-
        On Doffin, Norway's national platform for public procurement, the
        codes in this file are used as is. That means, the `code` values are
        used directly in the flow of information.
      eng_verify: false
      nob: >-
        På Doffin, Norges nasjonale plattform for offentlige innkjøp,
        brukes kodene i denne fila som de er. Det vil si at `code`-verdien
        brukes direkte i dataflyten.
      nob_verify: false
      nno: >-
        På Doffin, Noregs nasjonale plattform for offentlege innkjøp, blir
        kodane i denne fila brukt slik dei er. Det vil seie at
        `code`-verdien blir nytta direkte i dataflyten.
      nno_verify: false
  ted:
    description:
      eng: >-
        When DFØ, Norway's national eSender, submits notices to TED,
        the Norwegian extension codes are never used directly. DFØ
        ensures that these are mapped to the code value
        `ted_mapping.code`.
      eng_verify: false
      nob: >-
        Når DFØ, Norges eSender, oversender kunngjøringer til TED,
        brukes aldri norske utvidelseskoder direkte. I stedet kobler DFØ
        disse alltid til kodeverdien `ted_mapping.code`.
      nob_verify: false
      nno: >-
        Når DFØ, Noregs eSender, sender kunngjeringer over til TED,
        blir aldri norske utvidingskoder brukt direkte. I staden kobler
        DFØ desse alltid til kodeverdien `ted_mapping.code`.
      nno_verify: false

meta:
  agency: 'DFØ'
  changelog:
    - date: '2026-05-15'
      description:
        eng: >-
          Detailing breaking changes, in an update to reflect
          new Norwegian procurement regulations effective 2026-07-01.
          Retires `quality-nor-env-none` (previously tied to the repealed
          § 7-9 (5) of the Norwegian Public Procurement Regulations).
          Adds three new exemption codes under the new Sections 7-9 (3)-(4).
          Revises labels for `quality-nor-env-criteria` and
          `quality-nor-env-spec` to align with updated regulatory language.
          `quality-nor-env-spec` now covers both replacement and combination
          cases per the new Section 7-9 (2).
        nob: >-
          Brytende endringer i en oppdatering som gjenspeiler nytt
          norsk anskaffelsesregelverk gjeldende fra 2026-07-01.
          Kodeverdien `quality-nor-env-none` utgår (tidligere knyttet til
          opphevet § 7-9 (5) i Anskaffelsesforskriften). Legger til tre
          nye unntakskoder under nye § 7-9 (3)-(4). Etiketter for
          `quality-nor-env-criteria` og `quality-nor-env-spec` revideres
          i tråd med oppdatert regelverksspråk. `quality-nor-env-spec`
          dekker heretter både erstatnings- og kombinasjonstilfeller etter
          § 7-9 (2).
        nno: >-
          Brytande endringar i ei oppdatering som speglar nytt norsk
          anskaffingsregelverk gjeldande frå 2026-07-01. Kodeverdien
          `quality-nor-env-none` går ut (tidlegare knytt til
          oppheva § 7-9 (5) i Anskaffingsforskrifta). Legger til tre
          nye unntakskodar under nye § 7-9 (3)-(4). Etikettar for
          `quality-nor-env-criteria` og `quality-nor-env-spec` blir
          reviderte i tråd med oppdatert regelverksspråk.
          `quality-nor-env-spec` dekkjer frå no av både erstatnings-
          og kombinasjonstilfelle etter § 7-9 (2).
      version: '2.0.0'
    - date: '2025-12-08'
      description:
        eng: >-
          Initial version. Introduced `quality-nor-env-criteria`,
